<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Yuvarlatilmis kare arka plan (Netflix renginden uzak slate ton) -->
  <rect x="0" y="0" width="128" height="128" rx="26" ry="26" fill="#1F2937"/>

  <!-- Goz (ellipse outline) -->
  <ellipse cx="64" cy="64" rx="46" ry="24" fill="none" stroke="#FFFFFF" stroke-width="9"/>

  <!-- Goz bebegi -->
  <circle cx="64" cy="64" r="14" fill="#FFFFFF"/>

  <!-- Slash arka plani: BG renginde kalin cizgi - goz/bebegi orterek slash icin temiz bir kesim olusturur -->
  <line x1="24" y1="104" x2="104" y2="24" stroke="#1F2937" stroke-width="20" stroke-linecap="round"/>

  <!-- Slash gorunur kismi - "hide" anlamini veren capraz cizgi -->
  <line x1="24" y1="104" x2="104" y2="24" stroke="#EF4444" stroke-width="10" stroke-linecap="round"/>
</svg>
